name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  PYTHONPATH: src

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r src/config/requirements.txt

      - name: Run tests
        run: pytest -q -c src/config/pytest.ini -m "not e2e"

      - name: Validate locales
        run: python src/scripts/validate_locales.py

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r src/config/requirements.txt
          pip install pytest-playwright==0.6.2
          playwright install chromium

      - name: E2E smoke tests
        run: pytest src/tests/e2e -q -c src/config/pytest.ini -m e2e

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/whatsapp-bridge/package-lock.json

      - name: Install bridge dependencies
        working-directory: src/whatsapp-bridge
        run: npm ci

      - name: Syntax check bridge
        working-directory: src/whatsapp-bridge
        run: node --check server.js
